<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Primer</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(
            circle at 30% 20%,
            color-mix(in oklab, currentColor 6%, transparent),
            transparent 60%
          ),
          radial-gradient(
            circle at 70% 80%,
            color-mix(in oklab, currentColor 4%, transparent),
            transparent 60%
          );
        text-align: center;
      }
      h1 {
        font-size: 1.6rem;
        font-weight: 600;
        margin: 0 0 0.4rem;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0;
        max-width: 28rem;
        font-size: 0.95rem;
        opacity: 0.7;
        line-height: 1.5;
      }
      .stage {
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        opacity: 0.45;
        margin-top: 1.6rem;
      }
    </style>
  </head>
  <body>
    <h1>The Primer</h1>
    <p>A Socratic learning companion. Settings, chat, and live evaluation arrive in the next steps.</p>
    <div class="stage">Step 2 · scaffold</div>
  </body>
</html>
