name: CI

# Skip the workflow for changes that touch only documentation surfaces.
# Rationale (closes #168):
#   - macOS-runner minutes are ~10× the cost of Linux minutes on GitHub's
#     billing. A docs-only push (README, ROADMAP, CLAUDE.md, NEXT_SESSION.md,
#     anything under docs/, handoff snapshots) cannot break the build, so
#     spinning up the macOS feature-combos drift-guard + the Android
#     cross-compile + the Linux test/clippy jobs is pure waste.
#   - `**/*.md` is safe today: no Rust test reads a committed `.md` file
#     (verified via `grep -rn include_str.*\\.md src/`); the only `.md`
#     references inside tests are tempfile fixtures (e.g.
#     primer-kb-load/src/lib.rs:510) that synthesise their own files.
#   - `docs/**` is somewhat redundant with `**/*.md` (most of docs/ is .md)
#     but defends against future non-md additions there (PDFs, images).
#   - Data surfaces are deliberately NOT in the ignore list. Anything under
#     `data/seed/` (corpus JSONL) or `data/ingest/` (Python ingest pipeline)
#     can change retrieval-quality test expectations and MUST run CI.
#
# Branch-protection caveat: if `cargo test (default features)` is wired as
# a required status check on `main` (still overdue per CLAUDE.md), a
# docs-only PR would be stuck waiting for a job that never runs. Two known
# mitigations:
#   1. "Skipped-but-required" stub job whose name matches the required-check
#      name and always passes on docs-only paths.
#   2. Per-job `paths:` allowlists so non-matching jobs get a `skipped`
#      conclusion (which branch protection accepts as passing).
# Branch protection is not yet wired, so the simpler workflow-level
# `paths-ignore` is sufficient today. Revisit at the same time as flipping
# the branch-protection setting.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

permissions:
  contents: read

# Cancel in-flight runs on the same branch when a new push lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Default-feature build + test on Linux. The full speech-feature build
  # needs ONNX Runtime + espeak-ng and significantly more time; left to a
  # later workflow once the speech path stabilises.
  test:
    name: cargo test (default features)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux system deps
        # primer-gui depends on Tauri 2.x, which on Linux uses
        # webkit2gtk for its webview. The dev headers and their
        # transitive pkg-config files (glib-2.0, gtk, soup, etc.)
        # aren't in the default ubuntu-latest image. libxdo-dev is
        # required by tauri-runtime-wry for hotkey/clipboard;
        # libayatana-appindicator3-dev is for tray. macOS uses Apple's
        # WebKit framework directly so no equivalent step is needed
        # there.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        # rust-toolchain.toml lives at src/rust-toolchain.toml — pinned
        # to 1.87 + rustfmt + clippy. The action picks it up automatically
        # when invoked from the workspace root.
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          # Pinning the channel here would override the toolchain file;
          # leave it on `stable` and let rustup honor src/rust-toolchain.toml.

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        # `-- -D warnings` is co-located with the step that enforces it
        # so a CI failure here reads as a policy choice rather than an
        # invisible workflow-env escalation (closes #95).
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        # Includes the retrieval-quality integration test in
        # primer-kb-load/tests/retrieval_quality.rs, which loads the
        # in-repo seed corpus and asserts canonical child queries
        # surface the right passages.
        #
        # `RUSTFLAGS: -D warnings` is set step-locally so test-only
        # compile warnings (e.g. new dead-code in #[cfg(test)] blocks)
        # still fail CI, matching the pre-#95 workflow-env behaviour.
        env:
          RUSTFLAGS: -D warnings
        run: cargo test --workspace --no-fail-fast

  # Non-default feature build drift-guard. The default `cargo test` step
  # exercises the default feature stack — which now includes `embedding`
  # (hybrid retrieval is default-on), so `fastembed` is covered on Linux by
  # that job. `supertonic` remains non-default and was invisible to default
  # CI: it rotted silently in PR #127 (broken supertonic build) and PR #150
  # (broken macos-native-26 build) before reaching review. This job runs
  # `cargo check` against each Linux-buildable non-default feature stack
  # so transitive-dep API drift fails CI on the PR rather than during a
  # developer's later re-verification. Build-only (no `cargo test`) is
  # sufficient: the bug class we are guarding against is "API drift
  # broke compilation," not runtime regressions. The `fastembed` check
  # below is now somewhat redundant with the default job on Linux but is
  # cheap and keeps the embedding stack covered independently of any future
  # default-feature change; the real new fastembed proof is the macOS step
  # in `feature-combos-macos`. macOS-only features (`macos-native`,
  # `macos-native-26`) are not covered here — they need platform-specific
  # runners; see issues #129 and #151 for the broader matrix proposal.
  feature-combos:
    name: cargo check (non-default features)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri Linux system deps
        # primer-speech itself doesn't need webkit2gtk, but the
        # workspace `Cargo.lock` resolution still pulls in some crates
        # that transitively reference Tauri's optional deps when the
        # workspace is checked. Match the default-test job's deps to
        # keep the resolution identical.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src
          key: feature-combos

      - name: cargo check --features supertonic
        # Closes #129. PR #127 landed a broken ort rc.7 → rc.10 migration
        # in the vendored supertonic-rs that was invisible to default-CI
        # (no `--features supertonic` ever ran). PR #128 fixed it
        # after-the-fact. This step makes the same bug class fail loudly
        # on the PR introducing it. ONNX runtime downloads from
        # cdn.pyke.io on first build; the rust-cache layer above keeps
        # subsequent runs warm.
        run: cargo check -p primer-speech --features supertonic

      - name: cargo clippy --features supertonic
        # `cargo check` above guards against build breaks; it does NOT
        # catch lint rot. PR #175 (Supertonic Stage B) shipped with a
        # latent clippy warning in `examples/tts_supertonic_hello.rs`
        # that the `check` step above could never have caught — only
        # `clippy -- -D warnings` does. `--all-targets` is required so
        # the example (not just the lib) is linted. Co-locate the
        # `-D warnings` with the step for the same reason as the default
        # job's clippy step (closes #95).
        run: cargo clippy -p primer-speech --features supertonic --all-targets -- -D warnings

      - name: cargo check --features fastembed
        # Mirrors the supertonic guard for the embedding path. The
        # workspace pin of `ort = "=2.0.0-rc.10"` is load-bearing for
        # both stacks (see CLAUDE.md); breaking either silently regresses
        # hybrid retrieval (fastembed) or the supertonic A/B comparison.
        run: cargo check -p primer-embedding --features fastembed

      - name: cargo clippy --features llamacpp
        # Phase 1.1 drift guard. The embedded llama.cpp backend + its
        # benchmark example (`examples/llamacpp_bench.rs`,
        # required-features = llamacpp) are non-default, so they rot
        # silently. `--all-targets` lints the example too. Compiles
        # llama.cpp (C++) on first run; the rust-cache layer above keeps
        # subsequent runs warm.
        run: cargo clippy -p primer-inference --features llamacpp --all-targets -- -D warnings

  # macOS feature-combo drift-guard. The Apple-native speech backends
  # (`macos-native`, `macos-native-26`) and the `voice-loop` state
  # machine they wire into are platform-specific and invisible to the
  # default `ubuntu-latest` test job — so they rot silently between PRs.
  # PR #162 surfaced this: the `voice-loop + macos-native*` combo had
  # been broken in main for 11 days post-#147 because no CI job exercised
  # the import path. Issue #151 tracks the broader matrix; this job
  # closes the most acute gap (the combos that have actually rotted).
  #
  # `cargo clippy -- -D warnings` rather than `cargo check`: PR #150
  # uncovered three lints that had rotted in `build.rs` and
  # `macos26/vad.rs` because that feature gate had never been clippy'd.
  # The pattern is "drift catches both build breaks AND lint rot", so
  # clippy is the right tool here.
  #
  # Not covered yet:
  # - `macos-native-26`: requires macOS 26.x specifically; GitHub
  #   Actions does not yet provide a hosted macos-26 image. Defer until
  #   the image lands or a self-hosted runner is wired (issue #151).
  # - `voice-loop` on its own (no macos-native): structurally covered
  #   by the `voice-loop,macos-native` step since the voice-loop layer
  #   compiles either way; a standalone Linux check is a low-value
  #   addition until a bug actually surfaces.
  feature-combos-macos:
    name: cargo clippy (macOS feature combos)
    runs-on: macos-latest
    # Defensive cap on macOS-runner billing. macOS minutes are ~10× the
    # cost of Linux minutes; a wedged clippy invocation should not be
    # able to run out the 360 min GitHub default. 30 min comfortably
    # accommodates a cold ort-runtime download + three clippy builds
    # (observed: 2m23s warm-cache on this PR's first run).
    timeout-minutes: 30
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # rust-toolchain.toml at src/rust-toolchain.toml pins the
        # workspace version (currently 1.88) + rustfmt + clippy. The
        # action picks it up when invoked from src/. Leave channel on
        # `stable` so rustup honors the toolchain file; the toolchain
        # file is the single source of truth for components, matching
        # the Linux `feature-combos` job's shape.
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src
          # Distinct key so the macOS cache doesn't collide with the
          # Linux feature-combos cache (different OS, different target
          # triple, different ort runtime binary).
          key: feature-combos-macos

      - name: cargo clippy -p primer-speech --features macos-native
        # SFSpeechRecognizer + AVSpeechSynthesizer wired through the
        # speech traits. macOS 13+ floor. Bundles `objc2-speech`,
        # `objc2-avf-audio`, `block2`, `dispatch2` — any one of which
        # could break across an Apple SDK update.
        run: cargo clippy -p primer-speech --features macos-native --all-targets -- -D warnings

      - name: cargo clippy -p primer-speech --features voice-loop,macos-native
        # The exact combo that broke in main for 11 days post-#147
        # before PR #162 caught it. Wires the shared LISTEN → THINK →
        # SPEAK state machine over Apple-native STT/TTS via the
        # `backends_macos_native` builder.
        run: cargo clippy -p primer-speech --features voice-loop,macos-native --all-targets -- -D warnings

      - name: cargo clippy -p primer-cli --features speech,macos-native
        # Full primer-cli assembly under the production macOS speech
        # build (the binary that ships to end-user macOS devices).
        # Catches drift in the cfg-gated `SpeechLoopConfig` shape, the
        # main-thread tokio runtime selection, and the espeak-ng probe
        # — all of which differ across the macos-native build.
        run: cargo clippy -p primer-cli --features speech,macos-native --all-targets -- -D warnings

      - name: cargo clippy -p primer-embedding --features fastembed
        # Proves the cdn.pyke.io ort-runtime download + link works on macOS
        # — the other half of the Linux proof in the feature-combos job.
        # `clippy` (like `check`) runs build.rs, which triggers the download.
        # This is the prerequisite that gated flipping hybrid retrieval
        # default-on (see
        # docs/superpowers/specs/2026-05-30-hybrid-retrieval-default-on-design.md).
        run: cargo clippy -p primer-embedding --features fastembed --all-targets -- -D warnings

  # Android cross-compile drift-guard. Catches transitive-dep platform
  # breakage before it surprises a developer in Termux on RedMagic 11.
  # This job does NOT validate runtime behaviour on Android — only that
  # the workspace cross-compiles. The actual on-device validation is
  # documented in docs/devel/redmagic-termux-quickstart.md.
  android-cross-compile:
    name: cargo build (aarch64-linux-android)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # NB: `dtolnay/rust-toolchain`'s `targets:` installs the cross
        # target for the action's `toolchain:` (here, `stable`). But the
        # workspace pins Rust 1.88 via `src/rust-toolchain.toml`, and
        # cargo invocations from `src/` use that pin — so the cross
        # target on `stable` is never reached and the build fails with
        # `can't find crate for std/core`. The next step installs the
        # target for whatever toolchain the workspace actually uses,
        # by running rustup from `src/` where the pin is honored.
        uses: dtolnay/rust-toolchain@stable

      - name: Install Android target for workspace-pinned toolchain
        # rustup from inside `src/` resolves to the pinned 1.88
        # toolchain and adds the target to it. Don't hard-code the
        # version here — `rust-toolchain.toml` is the single source
        # of truth for the workspace's Rust version.
        run: rustup target add aarch64-linux-android

      - name: Guard ort-sys android cache_dir cfg patch (issue #180)
        # The vendored `ort-sys` android `cache_dir` cfg arm (PR #179,
        # issue #157) fixes a build.rs E0432 that ONLY manifests when
        # building natively on an Android HOST (Termux). Every cargo
        # step in this job cross-compiles FROM Linux, so `ort-sys`'s
        # build.rs compiles for the Linux host and the android arm is
        # never exercised — a regression of that patch would keep CI
        # green while native Termux builds break again.
        #
        # This script codifies PR #179's manual probe: it compiles a
        # build.rs-mimicking consumer with `rustc --target
        # aarch64-linux-android --emit=metadata` (no NDK linker needed)
        # against both the patched dirs.rs (must pass) and a
        # cfg-reverted counterfactual (must fail with E0432, proving the
        # guard has teeth). Runs from `src/` so `rustc` resolves to the
        # workspace-pinned toolchain; placed before the NDK download so
        # a regression fails fast.
        run: ../scripts/check-ort-sys-android-cfg.sh

      - name: Cache cargo registry + build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src
          key: android-aarch64

      - name: Install Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Export NDK toolchain env for downstream cargo steps
        # Single source of truth for the four NDK env vars every
        # `cargo build --target aarch64-linux-android …` step in this
        # job needs. Writing them to $GITHUB_ENV here (rather than
        # duplicating per-step `env:` blocks) keeps the NDK path
        # interpolation in one place — bumping API level or migrating
        # off `nttld/setup-ndk` becomes a one-line change. API 24 is
        # the lowest sensible floor; bump if any transitive dep needs
        # newer APIs.
        #
        # Job-level `env:` is NOT an option here: it's evaluated before
        # any step runs, so `${{ steps.ndk.outputs.ndk-path }}` would
        # resolve to the empty string. Step-level $GITHUB_ENV writes
        # are the documented pattern for env that depends on a prior
        # step's output.
        run: |
          NDK_BIN="${{ steps.ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin"
          {
            echo "CC_aarch64_linux_android=${NDK_BIN}/aarch64-linux-android24-clang"
            echo "CXX_aarch64_linux_android=${NDK_BIN}/aarch64-linux-android24-clang++"
            echo "AR_aarch64_linux_android=${NDK_BIN}/llvm-ar"
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=${NDK_BIN}/aarch64-linux-android24-clang"
          } >> "$GITHUB_ENV"

      - name: Cross-compile primer binary
        # NB: `--bin primer` only (no `--workspace`). On the *desktop*
        # feature set the `primer-gui` crate's Tauri deps don't cross-compile
        # to Android (webkit2gtk etc.); `cargo build --bin primer` builds only
        # that binary's dep graph, which excludes `primer-gui` (sibling crate,
        # not a dep). The Android-*mobile* build of `primer-gui` (Tauri's
        # android webview, not webkit2gtk) IS now in scope and is guarded by
        # its own step below — see "Cross-compile primer-gui (Tauri mobile)".
        #
        # `--no-default-features`: hybrid retrieval is default-on for the
        # host CLI, but the aarch64-linux-android ort-runtime download from
        # cdn.pyke.io is device-unverified (issue #157). The Android product
        # ships BM25-only by guidance (`--embedder-backend none`), so the
        # cross-compile guard builds without the `embedding` feature.
        run: cargo build --target aarch64-linux-android --no-default-features --bin primer

      - name: Cross-compile primer-gui (Tauri mobile)
        # Drift-guard for the Android packaging scaffold (PR #214). The GUI
        # ships a `#[cfg(mobile)] #[tauri::mobile_entry_point]` and a
        # `[lib] crate-type = [..., "cdylib", ...]` so `cargo-tauri android
        # build`'s inner cargo invocation links the app as the native shared
        # library Android's `MainActivity` loads. Neither is exercised by any
        # other CI job: the desktop `test` job builds primer-gui for the host
        # (mobile cfg OFF, no cdylib needed), and the `--bin primer` step
        # above excludes primer-gui entirely. Without this guard, dropping
        # `rlib`/`cdylib` from `[lib]`, or any transitive-dep break on the
        # android-mobile Tauri path (tao/wry android backend), would stay
        # green in CI and only surface during a manual APK build.
        #
        # This compiles the cdylib and the mobile entry point (the target is
        # aarch64-linux-android, so tauri-build sets `mobile`); it does NOT
        # run Gradle or produce an APK — a full `tauri android build` needs
        # JDK+SDK+Gradle and is the deferred follow-up. `--no-default-features`
        # keeps it BM25-only, matching the Android posture (issue #157) and
        # the documented build invocation. NDK env vars are inherited from
        # the earlier "Export NDK toolchain env" step.
        run: cargo build --target aarch64-linux-android --no-default-features -p primer-gui

      - name: Cross-compile primer-gui --features qnn (Tauri mobile)
        # Drift-guard for sub-project 2 of the Android-packaging effort: the
        # QNN-on-Android APK builds `primer-gui` with `--features qnn` (which
        # chains to `primer-engine/qnn`, pulling QnnBackend + primer-qnn-sys
        # into the GUI's android-mobile dep graph). The plain primer-gui step
        # above is qnn-OFF, and the `primer-cli --features qnn` step below
        # exercises the CLI's dep graph, not the GUI's Tauri-mobile one. This
        # combination — the qnn FFI seam reaching through `build_qnn_backend`
        # into the mobile cdylib — is otherwise invisible to CI and would
        # only surface during a manual `cargo-tauri android build … --features
        # qnn`. Compiles the cdylib + mobile entry point with qnn active; it
        # does NOT run Gradle, bundle the (proprietary, git-ignored) QAIRT
        # `.so`s, or produce an APK. `--no-default-features` keeps it BM25-only
        # (issue #157), matching the documented build invocation. NDK env vars
        # are inherited from the earlier "Export NDK toolchain env" step.
        run: cargo build --target aarch64-linux-android --no-default-features -p primer-gui --features qnn

      - name: Cross-compile primer-qnn-sys
        # The Phase 1.2 Genie/QNN FFI crate is `target_os = "android"`-gated
        # for its real-dlopen path; on every other target `GenieLibrary::open`
        # returns `PlatformUnsupported`. Until step 1.2.4 wires `--backend qnn`
        # through `primer-cli`, this crate is NOT in the `--bin primer` dep
        # graph above, so we need a dedicated build step to catch drift on
        # the Android-cfg branch (e.g. a transitive libloading bump that
        # silently breaks NDK linking). NDK env vars are inherited from
        # the earlier "Export NDK toolchain env" step.
        run: cargo build --target aarch64-linux-android -p primer-qnn-sys

      - name: Cross-compile primer-cli --features qnn
        # Step 1.2.4 wired `--backend qnn` through `primer-cli` behind the
        # `qnn` cargo feature; steps 1.2.2–1.2.5 added the QnnBackend impl,
        # the streaming bridge, and the per-backend context budget — all
        # gated on that feature. The plain `--bin primer` build above does
        # NOT exercise the `qnn` feature (it's off by default), so the
        # whole QnnBackend dep graph — including the `Arc<GenieLibrary>`
        # wrapper, the C-ABI token callback, and the `spawn_blocking` query
        # path — is invisible to default Android CI. This step cross-compiles
        # the production binary with the feature on, catching Android-cfg
        # drift in the QnnBackend ↔ primer-qnn-sys FFI seam before it
        # surprises a developer building on RedMagic Termux. NDK env vars
        # are inherited from the earlier "Export NDK toolchain env" step.
        #
        # `--no-default-features --features qnn`: `--features` is additive to
        # defaults, so without `--no-default-features` this would also pull
        # the default `embedding` feature → the device-unverified android ort
        # download (issue #157). Keep the qnn guard BM25-only.
        run: cargo build --target aarch64-linux-android --no-default-features -p primer-cli --features qnn

      - name: Cross-compile qnn_bench example
        # Phase 1.2 step 1.2.6's device benchmark lives in
        # `primer-inference/examples/qnn_bench.rs` (required-features = qnn).
        # The `primer-cli --features qnn` build above pulls in the bench
        # *module* (it's part of the qnn lib surface), but NOT the example
        # binary — examples are only built on demand. This step builds it
        # for Android so the harness's tokio/clap/futures orchestration
        # keeps compiling on the target it actually runs on (the RedMagic
        # 11 Pro via Termux). NDK env vars are inherited from the earlier
        # "Export NDK toolchain env" step.
        run: cargo build --target aarch64-linux-android -p primer-inference --features qnn --example qnn_bench

  # Gradle wrapper supply-chain guard. The Android packaging scaffold
  # (PR #214) commits `gen/android/gradle/wrapper/gradle-wrapper.jar` — a
  # binary blob that `./gradlew` executes with full build privileges.
  # Standard Tauri practice is to commit it, but a committed executable jar
  # is a supply-chain surface: a tampered wrapper could run arbitrary code
  # during any Android build. This job validates the jar's checksum against
  # Gradle's published known-good hashes (the action maintains the list), so
  # a swapped or corrupted wrapper fails CI rather than silently shipping.
  # Cheap (checkout + checksum, no build), and it only has teeth while the
  # committed jar exists. Mirrors Gradle's own recommended hardening.
  gradle-wrapper-validation:
    name: validate gradle wrapper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
